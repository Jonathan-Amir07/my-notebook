<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <!-- Background Circle -->
    <rect width="512" height="512" rx="128" fill="#2c3e50"/>
    
    <!-- Notebook Pages -->
    <path d="M160 120 h220 a20 20 0 0 1 20 20 v232 a20 20 0 0 1 -20 20 h-220 z" fill="#fdfbf7"/>
    <path d="M140 140 h220 a20 20 0 0 1 20 20 v232 a20 20 0 0 1 -20 20 h-220 z" fill="#ecf0f1"/>
    <path d="M120 160 h220 a20 20 0 0 1 20 20 v232 a20 20 0 0 1 -20 20 h-220 z" fill="#ffffff" stroke="#bdc3c7" stroke-width="4"/>
    
    <!-- Notebook Spine/Binding -->
    <rect x="100" y="160" width="40" height="272" rx="10" fill="#e74c3c"/>
    <circle cx="120" cy="190" r="10" fill="#34495e"/>
    <circle cx="120" cy="245" r="10" fill="#34495e"/>
    <circle cx="120" cy="300" r="10" fill="#34495e"/>
    <circle cx="120" cy="355" r="10" fill="#34495e"/>
    <circle cx="120" cy="410" r="10" fill="#34495e"/>
    
    <!-- Lines -->
    <line x1="160" y1="220" x2="310" y2="220" stroke="#bdc3c7" stroke-width="6" stroke-linecap="round"/>
    <line x1="160" y1="260" x2="280" y2="260" stroke="#bdc3c7" stroke-width="6" stroke-linecap="round"/>
    <line x1="160" y1="300" x2="310" y2="300" stroke="#bdc3c7" stroke-width="6" stroke-linecap="round"/>
    <line x1="160" y1="340" x2="250" y2="340" stroke="#bdc3c7" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Accent / Bookmark -->
    <path d="M280 160 v80 l25 -20 l25 20 v-80 z" fill="#f1c40f"/>
</svg>
