<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" name="viewport" />
    <title>404 - Page Not Found | Academic Notebook</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
    
    <style>
        body {
            background-color: var(--workspace-bg, #fdfbf7);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--ink-color, #2c3e50);
            text-align: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(44, 62, 80, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .error-container {
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
        }

        .error-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: var(--save-color, #2ecc71);
            border-radius: 12px 12px 0 0;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 6rem;
            margin: 0;
            color: var(--sidebar-bg, #2c3e50);
            line-height: 1;
        }

        h2 {
            font-family: 'Kalam', cursive;
            font-size: 2rem;
            margin: 10px 0 20px;
            color: #7f8c8d;
        }

        p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .sketch-doodle {
            font-family: 'Kalam', cursive;
            font-size: 1.5rem;
            color: var(--highlighter, rgba(241, 196, 15, 0.5));
            position: absolute;
            transform: rotate(-10deg);
        }

        .doodle-1 { top: 20px; left: 20px; }
        .doodle-2 { bottom: 30px; right: 30px; transform: rotate(15deg); color: rgba(231, 76, 60, 0.3); }

        .btn-home {
            display: inline-block;
            background: var(--save-color, #2ecc71);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
            border: none;
            cursor: pointer;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(46, 204, 113, 0.3);
            background: #27ae60;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="sketch-doodle doodle-1">Oops...</div>
        <div class="sketch-doodle doodle-2">?</div>
        
        <h1>404</h1>
        <h2>Page not found</h2>
        
        <p>It looks like this page was erased from our notebook.<br>Let's get you back to your study materials.</p>
        
        <a href="/app" class="btn-home">Return to Notebook</a>
    </div>
</body>
</html>
